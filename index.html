<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Забронируй наше свидание 💕</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 20px 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #FBEAF0 0%, #F4C0D1 100%);
    min-height: 100vh;
    color: #4B1528;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
  }
  h1 {
    font-family: Georgia, serif;
    font-size: 28px;
    font-weight: 500;
    margin: 12px 0 6px;
    color: #993556;
    text-align: center;
  }
  .subtitle {
    font-size: 14px;
    color: #993556;
    margin: 0;
    text-align: center;
    opacity: 0.8;
  }
  .header { text-align: center; margin-bottom: 24px; }
  .emoji-big { font-size: 40px; line-height: 1; }
  .card {
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 14px;
    border: 1px solid rgba(255,255,255,0.8);
  }
  .label {
    font-size: 13px;
    font-weight: 600;
    color: #993556;
    margin: 0 0 10px;
  }
  input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #F4C0D1;
    border-radius: 10px;
    background: white;
    font-size: 14px;
    font-family: inherit;
    color: #4B1528;
    outline: none;
  }
  input[type="text"]:focus { border-color: #D4537E; }
  .activity-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .act-btn {
    background: white;
    border: 1px solid #F4C0D1;
    border-radius: 12px;
    padding: 16px 8px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    text-align: center;
  }
  .act-btn:hover { border-color: #D4537E; transform: translateY(-1px); }
  .act-btn.selected { background: #D4537E; border-color: #D4537E; }
  .act-btn.selected .act-label { color: white; }
  .act-emoji { font-size: 24px; margin-bottom: 4px; }
  .act-label { font-size: 13px; font-weight: 500; color: #4B1528; }
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .month-btn {
    background: white;
    border: 1px solid #F4C0D1;
    border-radius: 10px;
    width: 36px;
    height: 36px;
    cursor: pointer;
    color: #993556;
    font-size: 18px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .month-btn:hover { background: #FBEAF0; }
  .month-label {
    font-size: 15px;
    font-weight: 600;
    color: #993556;
    margin: 0;
  }
  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 6px;
  }
  .weekday {
    text-align: center;
    font-size: 11px;
    color: #993556;
    font-weight: 600;
    padding: 4px 0;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .day-cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
    background: white;
    border: 1px solid transparent;
    color: #4B1528;
    transition: all 0.15s;
  }
  .day-cell:hover:not(.disabled):not(.empty):not(.past) {
    border-color: #F4C0D1;
    transform: scale(1.05);
  }
  .day-cell.empty { background: transparent; cursor: default; }
  .day-cell.selected { background: #D4537E; color: white; font-weight: 600; }
  .day-cell.past { opacity: 0.3; cursor: not-allowed; }
  .time-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .time-btn {
    padding: 12px 8px;
    background: white;
    border: 1px solid #F4C0D1;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    color: #4B1528;
    transition: all 0.15s;
  }
  .time-btn:hover:not(.disabled) { border-color: #D4537E; }
  .time-btn.selected { background: #D4537E; color: white; border-color: #D4537E; }
  .time-btn.disabled {
    background: #F1EFE8;
    color: #aaa;
    cursor: not-allowed;
    border-color: transparent;
  }
  #confirm-btn {
    width: 100%;
    background: #D4537E;
    color: white;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    opacity: 0.4;
    transition: all 0.15s;
    margin-top: 4px;
  }
  #confirm-btn:not(:disabled) { opacity: 1; }
  #confirm-btn:not(:disabled):hover {
    background: #993556;
    transform: translateY(-1px);
  }
  .footer {
    text-align: center;
    font-size: 12px;
    color: #993556;
    margin: 16px 0 0;
    opacity: 0.7;
  }
  .success-screen {
    text-align: center;
    padding: 40px 20px;
    display: none;
  }
  .success-screen.active { display: block; }
  .success-screen h2 {
    font-family: Georgia, serif;
    font-size: 24px;
    color: #993556;
    margin: 16px 0 8px;
  }
  .success-screen p {
    color: #4B1528;
    font-size: 15px;
    margin: 0 0 24px;
  }
  .send-btn {
    display: inline-block;
    background: #0088cc;
    color: white;
    padding: 14px 28px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
    margin: 6px;
    border: none;
    cursor: pointer;
    font-family: inherit;
  }
  .send-btn.wa { background: #25D366; }
  .send-btn:hover { transform: translateY(-1px); }
  .booking-summary {
    background: rgba(255,255,255,0.7);
    border-radius: 14px;
    padding: 16px;
    margin: 20px 0;
    text-align: left;
  }
  .booking-summary p { margin: 4px 0; font-size: 14px; }
  .booking-summary strong { color: #993556; }
</style>
</head>
<body>
<div class="container">

<div id="main-view">
  <div class="header">
    <div class="emoji-big">💕</div>
    <h1>Забронируй наше свидание</h1>
    <p class="subtitle">Выбери дату, время и что захочешь — я всё устрою</p>
  </div>

  <div class="card">
    <p class="label">Как тебя зовут?</p>
    <input type="text" id="name-input" placeholder="Твоё имя 💗" />
  </div>

  <div class="card">
    <p class="label">Что будем делать?</p>
    <div class="activity-grid">
      <button class="act-btn" data-act="coffee">
        <div class="act-emoji">☕</div>
        <div class="act-label">Кофе</div>
      </button>
      <button class="act-btn" data-act="cinema">
        <div class="act-emoji">🎬</div>
        <div class="act-label">Кино</div>
      </button>
      <button class="act-btn" data-act="nature">
        <div class="act-emoji">🌿</div>
        <div class="act-label">Природа</div>
      </button>
    </div>
    <input type="text" id="custom-act" placeholder="...или напиши свой вариант ✨" />
  </div>

  <div class="card">
    <div class="cal-header">
      <button class="month-btn" id="prev-month">‹</button>
      <p class="month-label" id="month-label">Месяц</p>
      <button class="month-btn" id="next-month">›</button>
    </div>
    <div class="weekdays">
      <div class="weekday">Пн</div>
      <div class="weekday">Вт</div>
      <div class="weekday">Ср</div>
      <div class="weekday">Чт</div>
      <div class="weekday">Пт</div>
      <div class="weekday">Сб</div>
      <div class="weekday">Вс</div>
    </div>
    <div class="cal-grid" id="calendar-grid"></div>
  </div>

  <div class="card" id="time-section" style="display:none;">
    <p class="label">Выбери время</p>
    <div class="time-grid" id="time-grid"></div>
  </div>

  <button id="confirm-btn" disabled>
    Забронировать свидание 💌
  </button>

  <p class="footer">с любовью, специально для тебя</p>
</div>

<div class="success-screen" id="success-view">
  <div class="emoji-big">🌹</div>
  <h2>Свидание забронировано!</h2>
  <p>Осталось только отправить мне твой выбор:</p>
  <div class="booking-summary" id="booking-summary"></div>
  <button class="send-btn" id="send-tg">📨 Отправить в Telegram</button>
  <button class="send-btn wa" id="send-wa">💬 Отправить в WhatsApp</button>
  <p class="footer" style="margin-top: 20px;">не могу дождаться 💕</p>
</div>

</div>

<script>
// ========================================
// НАСТРОЙ ЭТО ПОД СЕБЯ:
// ========================================
const MY_TELEGRAM = 'your_telegram_username'; // твой ник в телеге БЕЗ @ (например 'ivan_petrov')
const MY_WHATSAPP = '79991234567'; // твой номер БЕЗ + и пробелов (например '79991234567')
// ========================================

const months = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const monthsLow = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const today = new Date();
today.setHours(0,0,0,0);
let viewYear = today.getFullYear();
let viewMonth = today.getMonth();
const state = { name: '', activity: null, customText: '', date: null, time: null };

document.getElementById('name-input').addEventListener('input', e => {
  state.name = e.target.value;
  updateBtn();
});

document.querySelectorAll('.act-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.act-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state.activity = btn.dataset.act;
    document.getElementById('custom-act').value = '';
    state.customText = '';
    updateBtn();
  });
});

document.getElementById('custom-act').addEventListener('input', e => {
  state.customText = e.target.value;
  if (e.target.value) {
    document.querySelectorAll('.act-btn').forEach(b => b.classList.remove('selected'));
    state.activity = null;
  }
  updateBtn();
});

function renderCalendar() {
  document.getElementById('month-label').textContent = months[viewMonth] + ' ' + viewYear;
  const grid = document.getElementById('calendar-grid');
  grid.innerHTML = '';
  let startWeekday = new Date(viewYear, viewMonth, 1).getDay();
  startWeekday = startWeekday === 0 ? 6 : startWeekday - 1;
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  for (let i = 0; i < startWeekday; i++) {
    const c = document.createElement('div');
    c.className = 'day-cell empty';
    grid.appendChild(c);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    cell.textContent = d;
    const cellDate = new Date(viewYear, viewMonth, d);
    const iso = viewYear + '-' + String(viewMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const dow = cellDate.getDay();
    const isPast = cellDate < today;
    if (isPast) {
      cell.classList.add('past');
    } else {
      cell.addEventListener('click', () => {
        document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
        cell.classList.add('selected');
        state.date = { y: viewYear, m: viewMonth, d: d, dow: dow, iso: iso };
        state.time = null;
        renderTimes();
        updateBtn();
      });
    }
    if (state.date && state.date.iso === iso) cell.classList.add('selected');
    grid.appendChild(cell);
  }
}

document.getElementById('prev-month').addEventListener('click', () => {
  const cur = new Date(viewYear, viewMonth, 1);
  const curMonthStart = new Date(today.getFullYear(), today.getMonth(), 1);
  if (cur <= curMonthStart) return;
  viewMonth--;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  renderCalendar();
});

document.getElementById('next-month').addEventListener('click', () => {
  viewMonth++;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderCalendar();
});

function renderTimes() {
  const section = document.getElementById('time-section');
  const grid = document.getElementById('time-grid');
  if (!state.date) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  grid.innerHTML = '';
  const dow = state.date.dow;
  const slots = ['10:00','12:00','14:00','16:00','18:00','19:00','20:00','21:00'];
  slots.forEach(slot => {
    const btn = document.createElement('button');
    btn.className = 'time-btn';
    btn.textContent = slot;
    const hour = parseInt(slot.split(':')[0]);
    const isBusy = (dow === 1 || dow === 2) && hour >= 9 && hour < 17;
    if (isBusy) {
      btn.classList.add('disabled');
      btn.disabled = true;
    } else {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        state.time = slot;
        updateBtn();
      });
    }
    grid.appendChild(btn);
  });
}

function updateBtn() {
  const hasActivity = state.activity || state.customText.trim();
  const ready = state.name.trim() && hasActivity && state.date && state.time;
  document.getElementById('confirm-btn').disabled = !ready;
}

function getBookingText() {
  const actMap = { coffee: 'кофе ☕', cinema: 'кино 🎬', nature: 'природа 🌿' };
  const actText = state.activity ? actMap[state.activity] : state.customText.trim() + ' ✨';
  const dateStr = state.date.d + ' ' + monthsLow[state.date.m] + ' в ' + state.time;
  return { name: state.name.trim(), activity: actText, date: dateStr };
}

document.getElementById('confirm-btn').addEventListener('click', () => {
  const b = getBookingText();
  document.getElementById('booking-summary').innerHTML =
    '<p><strong>Кто:</strong> ' + b.name + '</p>' +
    '<p><strong>Что:</strong> ' + b.activity + '</p>' +
    '<p><strong>Когда:</strong> ' + b.date + '</p>';
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('success-view').classList.add('active');
});

document.getElementById('send-tg').addEventListener('click', () => {
  const b = getBookingText();
  const msg = 'Привет 💕 Я забронировала наше свидание!%0A%0A👤 ' + b.name + '%0A✨ ' + b.activity + '%0A📅 ' + b.date;
  window.open('https://t.me/' + MY_TELEGRAM + '?text=' + msg, '_blank');
});

document.getElementById('send-wa').addEventListener('click', () => {
  const b = getBookingText();
  const msg = 'Привет 💕 Я забронировала наше свидание!\n\n👤 ' + b.name + '\n✨ ' + b.activity + '\n📅 ' + b.date;
  window.open('https://wa.me/' + MY_WHATSAPP + '?text=' + encodeURIComponent(msg), '_blank');
});

renderCalendar();
</script>
</body>
</html>
